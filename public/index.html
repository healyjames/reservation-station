<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make a Reservation — Reservation Station</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/js/theme.js"></script>
  </head>
  <body>
    <div class="calendar-container" role="region" aria-label="Date picker">
      <div class="calendar-header">
        <h2 id="calendar-title"></h2>
        <div class="calendar-nav">
          <button id="prev-month" aria-label="Previous month" disabled>&#8592;</button>
          <button id="next-month" aria-label="Next month">&#8594;</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid" role="grid"></div>

      <div class="selected-date-display" id="selected-date-display" aria-live="polite">
        Select a date to continue
      </div>
    </div>

    <script type="module" src="/js/calendar.js"></script>
  </body>
</html>
