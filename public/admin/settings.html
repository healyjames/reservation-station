<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Maximum Bookings</title>
    <link rel="stylesheet" href="/admin/styles/admin.css" />
    <script>
      if (!localStorage.getItem('admin_token')) {
        window.location.replace('/admin/?expired=1');
      }
    </script>
  </head>
  <body class="dashboard-page">

  <div class="dashboard-layout">

    <!-- left: sidebar navigation -->
    <nav class="sidebar-nav" aria-label="Dashboard navigation">
      <button class="tab-btn" onclick="window.location.href='/admin/dashboard'">Bookings</button>
      <button class="tab-btn active">Settings</button>
    </nav>

    <!-- right: header + main content -->
    <div class="main-panel">

      <header class="main-header">
        <div class="header-brand">
          <div class="header-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
          </div>
          <span class="header-venue-name" id="venue-name">Settings</span>
        </div>
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </header>

      <main id="main-content">

        <div id="settings-view" class="page-container"></div>

      </main>

    </div>

  </div>

    <script src="/admin/js/auth.js"></script>
    <script src="/admin/js/settings.js"></script>
    <script src="/admin/js/settings-page.js"></script>
  </body>
</html>
